name: Build and push image

# Fires when the `bundle` submodule pointer changes on `main` (i.e. a new
# generated release has been pinned) or when this workflow file itself is
# updated. Also supports manual dispatch.
#
# `bundle` in the paths filter refers to the gitlink file tracked by the
# superproject — a change means `scripts/build-bundle.mjs --push` just
# committed a new bundle release.

on:
  push:
    branches: [main]
    paths:
      - bundle
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # populate bundle/ so the Dockerfile is present

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - uses: docker/build-push-action@v6
        with:
          context: ./bundle
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
